<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="signup.css">
</head>

<body>
<div class="container">

<h2>VICTUS BANK</H2>
<form id="signupForm" class="ff">
<h2>Register</h2>
<input type="email" id="email" placeholder="Email" class="form" required><br>

<input type="password" id="password" placeholder="Password" class="form" required><br>

<select id="gender" class="form" required>
<option value="">Select Gender</option>
<option value="MALE">Male</option>
<option value="FEMALE">Female</option>
<option value="OTHER">Other</option>
</select><br>

<input type="date" id="dob" class="form" required><br>

<input type="text"
id="phoneNo"
placeholder="Phone Number"
class="form"
pattern="[6-9][0-9]{9}"
required><br>

<input type="text"
id="aadhaar"
class="form"
placeholder="Aadhaar Number"
pattern="[2-9][0-9]{11}"
required><br>

<button type="submit" class="form">Sign Up</button>
<p id="message"></p>

<a href="login.html" id="reg">Already have an account? Login</a>
<!-- <a href="sign.html" id="reg">Don't have an account? Register</a> -->
</form>
</div>


<script src="signup.js"></script>

</body>
</html>
